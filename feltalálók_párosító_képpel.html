<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magyar Feltalálók Párosító Játék</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Sans MS', 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #4facfe 75%, #00f2fe 100%);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            background: white;
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 1000px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .subtitle {
            text-align: center;
            color: #764ba2;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .game-area {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .column {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 20px;
            border-radius: 20px;
            border: 3px dashed #667eea;
        }

        .column h2 {
            color: #764ba2;
            margin-bottom: 20px;
            text-align: center;
            font-size: 1.2em;
        }

        .items {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .inventor, .invention, .formula {
            background: white;
            padding: 15px 20px;
            border-radius: 15px;
            cursor: pointer;
            user-select: none;
            border: 2px solid #667eea;
            transition: all 0.3s ease;
            text-align: center;
            font-weight: bold;
            color: #333;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }

        .inventor {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: 2px solid #667eea;
        }

        .invention {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: 2px solid #f5576c;
        }

        .formula {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border: 2px solid #00f2fe;
            font-size: 0.95em;
        }

        .inventor:hover, .invention:hover, .formula:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .inventor.selected, .invention.selected, .formula.selected {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 255, 0, 0.8);
            border: 3px solid #FFD700;
        }

        .connections-area {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            padding: 20px;
            border-radius: 20px;
            border: 3px dashed #f5576c;
            min-height: 150px;
            margin-bottom: 30px;
        }

        .connections-area h3 {
            color: #764ba2;
            margin-bottom: 15px;
            text-align: center;
        }

        .no-connections {
            text-align: center;
            color: #999;
            font-style: italic;
        }

        .connection-item {
            background: white;
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 5px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            color: #333;
            font-size: 0.9em;
            flex-wrap: wrap;
        }

        .connection-item.correct {
            background: #d4edda;
            border-left: 5px solid #28a745;
            color: #155724;
        }

        .remove-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            margin-left: 10px;
        }

        .remove-btn:hover {
            background: #ff5252;
            transform: scale(1.1);
        }

        .message {
            text-align: center;
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 20px;
            min-height: 40px;
            padding: 15px;
            border-radius: 15px;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 2px solid #28a745;
            animation: bounce 0.5s ease;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #f5576c;
            animation: shake 0.3s ease;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 15px 30px;
            font-size: 1.1em;
            font-weight: bold;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-check {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
        }

        .btn-check:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(40, 167, 69, 0.3);
        }

        .btn-next {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: none;
        }

        .btn-next:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-reset {
            background: linear-gradient(135deg, #f5576c 0%, #f093fb 100%);
            color: white;
        }

        .btn-reset:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(245, 87, 108, 0.3);
        }

        .score {
            text-align: center;
            font-size: 1.2em;
            color: #667eea;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .instruction {
            text-align: center;
            color: #666;
            font-size: 0.95em;
            margin-bottom: 15px;
            font-style: italic;
        }

        @media (max-width: 1024px) {
            .game-area {
                grid-template-columns: 1fr 1fr;
                gap: 20px;
            }
        }

        @media (max-width: 768px) {
            .game-area {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            h1 {
                font-size: 1.8em;
            }

            .container {
                padding: 20px;
            }
        }

        .math-formula {
            display: inline-block;
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔬 Magyar Feltalálók 🔬</h1>
        <p class="subtitle">Párosítsd a feltalálókat, a találmányaikat és a képleteket!</p>
        
        <div class="score">Szint: <span id="level">1</span></div>
        
        <p class="instruction">Kattints egy feltalálóra, majd a találmányra, végül a képletre!</p>
        
        <div class="message" id="message"></div>

        <div class="game-area">
            <div class="column">
                <h2>👨‍🔬 Feltalálók</h2>
                <div class="items" id="inventors"></div>
            </div>
            <div class="column">
                <h2>💡 Találmányok</h2>
                <div class="items" id="inventions"></div>
            </div>
            <div class="column">
                <h2>📐 Képletek</h2>
                <div class="items" id="formulas"></div>
            </div>
        </div>

        <div class="connections-area">
            <h3>🎯 Párosított elemek</h3>
            <div id="connections" class="no-connections">Kattints a párosítások létrehozásához!</div>
        </div>

        <div class="buttons">
            <button class="btn-check" onclick="checkAnswers()">✓ Ellenőrzés</button>
            <button class="btn-reset" onclick="resetGame()">🔄 Újra</button>
            <button class="btn-next" id="nextBtn" onclick="nextLevel()">➜ Következő szint</button>
        </div>
    </div>

    <script>
        const allData = [
            {
                pairs: [
                    { inventor: 'Rubik Ernő', invention: 'Rubik kocka', formula: '\\text{Permutációk: } 43.252.003.274.489.856.000' },
                    { inventor: 'Bíró László', invention: 'Golyóstoll', formula: '\\text{Pontosság: } \\pm 0,1 \\text{ mm}' },
                    { inventor: 'Gábor Dénes', invention: 'Holográfia', formula: '\\text{Hullámhossz: } \\lambda = \\frac{c}{f}' }
                ]
            },
            {
                pairs: [
                    { inventor: 'Puskás Tivadar', invention: 'Telefonközpont', formula: 'I = \\frac{U}{R} \\text{ (Ohm törvény)}' },
                    { inventor: 'Jedlik Ányos', invention: 'Dinamó', formula: '\\varepsilon = -N \\frac{d\\Phi}{dt}' },
                    { inventor: 'Eötvös Lóránd', invention: 'Torziós inga', formula: 'T = 2\\pi \\sqrt{\\frac{I}{C}}' }
                ]
            },
            {
                pairs: [
                    { inventor: 'Kandó Kálmán', invention: 'Villamos mozdony', formula: 'P = U \\cdot I \\cdot \\cos\\phi' },
                    { inventor: 'Szent-Györgyi Albert', invention: 'C-vitamin', formula: 'C_6H_8O_6 \\text{ (Aszkorbinsav)}' },
                    { inventor: 'Galamb József', invention: 'Ford T-modell műszaki megoldások', formula: 'F = m \\cdot a \\text{ (Newton II.)}' }
                ]
            }
        ];

        const correctTriples = {
            'Rubik Ernő-Rubik kocka': '\\text{Permutációk: } 43.252.003.274.489.856.000',
            'Bíró László-Golyóstoll': '\\text{Pontosság: } \\pm 0,1 \\text{ mm}',
            'Gábor Dénes-Holográfia': '\\lambda = \\frac{c}{f}',
            'Puskás Tivadar-Telefonközpont': 'I = \\frac{U}{R} \\text{ (Ohm törvény)}',
            'Jedlik Ányos-Dinamó': '\\varepsilon = -N \\frac{d\\Phi}{dt}',
            'Eötvös Lóránd-Torziós inga': 'T = 2\\pi \\sqrt{\\frac{I}{C}}',
            'Kandó Kálmán-Villamos mozdony': 'P = U \\cdot I \\cdot \\cos\\phi',
            'Szent-Györgyi Albert-C-vitamin': 'C_6H_8O_6',
            'Galamb József-Ford T-modell műszaki megoldások': 'F = m \\cdot a'
        };

        let currentLevel = 0;
        let connections = {};
        let selectedInventor = null;
        let selectedInvention = null;

        function initGame() {
            connections = {};
            selectedInventor = null;
            selectedInvention = null;
            document.getElementById('message').innerHTML = '';
            document.getElementById('message').className = 'message';
            document.getElementById('nextBtn').style.display = 'none';
            document.getElementById('level').textContent = currentLevel + 1;
            
            renderGame();
        }

        function renderGame() {
            const data = allData[currentLevel];
            
            // Shuffle formulas and inventions
            const shuffledFormulas = [...data.pairs].sort(() => Math.random() - 0.5);
            const shuffledInventions = [...data.pairs].sort(() => Math.random() - 0.5);
            
            // Get inventors
            const inventors = data.pairs.map(p => p.inventor);
            
            // Render inventors
            const inventorsDiv = document.getElementById('inventors');
            inventorsDiv.innerHTML = inventors.map(inventor => 
                `<div class="inventor" onclick="selectInventor(this, '${inventor}')">${inventor}</div>`
            ).join('');

            // Render inventions
            const inventionsDiv = document.getElementById('inventions');
            inventionsDiv.innerHTML = shuffledInventions.map(pair => 
                `<div class="invention" onclick="selectInvention(this, '${pair.invention}')">${pair.invention}</div>`
            ).join('');

            // Render formulas
            const formulasDiv = document.getElementById('formulas');
            formulasDiv.innerHTML = shuffledFormulas.map(pair => 
                `<div class="formula" onclick="selectFormula(this, '${pair.formula.replace(/'/g, "\\'")}')" title="${pair.formula}">$$${pair.formula}$$</div>`
            ).join('');

            // Re-render MathJax
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.log('MathJax error:', err));
            }, 100);

            renderConnections();
        }

        function selectInventor(element, inventor) {
            document.querySelectorAll('.inventor.selected').forEach(el => {
                el.classList.remove('selected');
            });

            if (selectedInventor === inventor) {
                selectedInventor = null;
                return;
            }

            element.classList.add('selected');
            selectedInventor = inventor;
        }

        function selectInvention(element, invention) {
            if (!selectedInventor) {
                alert('Először válassz ki egy feltalálót!');
                return;
            }

            document.querySelectorAll('.invention.selected').forEach(el => {
                el.classList.remove('selected');
            });

            if (selectedInvention === invention) {
                selectedInvention = null;
                return;
            }

            element.classList.add('selected');
            selectedInvention = invention;
        }

        function selectFormula(element, formula) {
            if (!selectedInventor || !selectedInvention) {
                alert('Először válassz ki egy feltalálót és egy találmányt!');
                return;
            }

            const key = selectedInventor + '-' + selectedInvention;
            connections[key] = formula;

            document.querySelectorAll('.inventor.selected').forEach(el => {
                el.classList.remove('selected');
            });
            document.querySelectorAll('.invention.selected').forEach(el => {
                el.classList.remove('selected');
            });

            selectedInventor = null;
            selectedInvention = null;

            renderConnections();
        }

        function renderConnections() {
            const connectionsDiv = document.getElementById('connections');
            
            if (Object.keys(connections).length === 0) {
                connectionsDiv.innerHTML = '<p class="no-connections">Kattints a párosítások létrehozásához!</p>';
                return;
            }

            connectionsDiv.innerHTML = Object.entries(connections).map(([key, formula]) => {
                const parts = key.split('-');
                const inventor = parts[0];
                const invention = parts[1];
                const isCorrect = correctTriples[key] === formula;
                
                return `
                    <div class="connection-item ${isCorrect ? 'correct' : ''}">
                        <span>${inventor} → ${invention} → $$${formula}$$</span>
                        <button class="remove-btn" onclick="removeConnection('${key.replace(/'/g, "\\'")}')" style="margin-left: auto;">✕</button>
                    </div>
                `;
            }).join('');

            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.log('MathJax error:', err));
            }, 100);
        }

        function removeConnection(key) {
            delete connections[key];
            renderConnections();
        }

        function checkAnswers() {
            const data = allData[currentLevel];
            let correct = 0;

            for (const pair of data.pairs) {
                const key = pair.inventor + '-' + pair.invention;
                if (connections[key] === pair.formula) {
                    correct++;
                }
            }

            const messageDiv = document.getElementById('message');
            
            if (correct === data.pairs.length) {
                messageDiv.innerHTML = '🎉 Gratulálok! Minden párosítás helyes!';
                messageDiv.className = 'message success';
                document.getElementById('nextBtn').style.display = 'block';
            } else {
                messageDiv.innerHTML = `❌ Próbáld újra! (${correct}/${data.pairs.length} helyes)`;
                messageDiv.className = 'message error';
            }
        }

        function resetGame() {
            connections = {};
            selectedInventor = null;
            selectedInvention = null;
            document.getElementById('message').innerHTML = '';
            document.getElementById('message').className = 'message';
            document.getElementById('nextBtn').style.display = 'none';
            renderGame();
        }

        function nextLevel() {
            currentLevel++;
            if (currentLevel >= allData.length) {
                currentLevel = 0;
            }
            initGame();
        }

        // Initialize the game
        initGame();
    </script>
</body>
</html>
